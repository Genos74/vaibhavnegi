<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vaibhav Negi — Game Design Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .modal { animation: modalFade 0.3s ease-out; }
    @keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="bg-gradient-to-b from-zinc-950 to-black text-zinc-100 min-h-screen">

  <!-- [Navbar, Hero, Current Project, About, Footer sections remain exactly the same as your previous code - I'm only showing the changed parts for brevity] -->

  <!-- ArtStation Works section (only this part changes) -->
  <section id="artstation" class="bg-zinc-900/50 py-20">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl md:text-5xl font-bold text-center mb-4">ArtStation Works</h2>
      <p class="text-center text-zinc-400 mb-12">Character concepts, illustrations & game art — loaded live via proxy</p>
      <div id="artstation-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <p class="col-span-full text-center text-zinc-500 py-10">Loading ArtStation projects… (via proxy)</p>
      </div>
    </div>
  </section>

  <!-- [Rest of HTML same - modal, etc.] -->

  <script>
    // === CONFIG AREA ===
    const ARTSTATION_USERNAME = "vaibhav_negi";

    // Your playableGames array (keep as-is or edit)

    // === ARTSTATION FETCH WITH BETTER PROXY ===
    async function loadArtstation() {
      const grid = document.getElementById("artstation-grid");
      grid.innerHTML = '<p class="col-span-full text-center text-zinc-500 py-10">Loading your ArtStation artwork via proxy…</p>';

      try {
        const originalUrl = `https://www.artstation.com/api/v2/users/${ARTSTATION_USERNAME}/projects.json?page=1&per_page=20`;
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(originalUrl)}`;

        const response = await fetch(proxyUrl);

        if (!response.ok) throw new Error(`Proxy status: ${response.status}`);

        const data = await response.json();
        const projects = data.data || [];

        grid.innerHTML = "";
        if (projects.length === 0) {
          grid.innerHTML = '<p class="col-span-full text-center text-amber-400 py-10">No projects loaded — profile might be empty or restricted.</p>';
          return;
        }

        projects.forEach(p => {
          const cover = p.cover_url || p.small_square_url || "https://via.placeholder.com/600";
          const desc = (p.description || "").replace(/<[^>]*>/g, "").substring(0, 140) + ((p.description || "").length > 140 ? "..." : "");
          const card = document.createElement("div");
          card.className = "card bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800 cursor-pointer";
          card.innerHTML = `
            <img src="${cover}" alt="${p.title}" class="w-full h-64 object-cover">
            <div class="p-6">
              <h4 class="text-xl font-semibold mb-2">${p.title}</h4>
              <p class="text-zinc-400 text-sm mb-4 line-clamp-3">${desc}</p>
              <div class="flex gap-3">
                <button class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-2 rounded-xl text-sm" onclick='openModal(\`${JSON.stringify(p).replace(/`/g,"\\`")}\`)'>Details</button>
                <a href="${p.url}" target="_blank" class="flex-1 text-center border border-zinc-700 hover:border-zinc-500 py-2 rounded-xl text-sm">ArtStation →</a>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });
      } catch (err) {
        grid.innerHTML = `<p class="col-span-full text-red-400 text-center py-10">Still couldn't load ArtStation.<br>Error: ${err.message}<br><br>Try: Refresh page, use incognito mode, or disable ad-blockers/extensions.<br>If persists, ArtStation may have tightened restrictions — we can fallback to manual embeds.</p>`;
      }
    }

    // [Rest of script: renderGames, openTrailer, openModal functions same as before]

    window.addEventListener("load", () => {
      loadArtstation();
      renderGames();
    });
  </script>
</body>
</html>
